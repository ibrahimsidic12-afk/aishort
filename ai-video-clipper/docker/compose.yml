version: "3.8"

services:
  ffmpeg-worker:
    build:
      context: ..
      dockerfile: docker/ffmpeg/Dockerfile
    env_file: ../.env.local
    restart: unless-stopped

  ai-worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    command: ["npx", "tsx", "workers/ai-worker/worker.ts"]
    env_file: ../.env.local
    restart: unless-stopped

  transcription-worker:
    build:
      context: ..
      dockerfile: docker/worker/Dockerfile
    command: ["npx", "tsx", "workers/transcription-worker/worker.ts"]
    env_file: ../.env.local
    restart: unless-stopped

  thumbnail-worker:
    build:
      context: ..
      dockerfile: docker/ffmpeg/Dockerfile
    command: ["npx", "tsx", "workers/thumbnail-worker/worker.ts"]
    env_file: ../.env.local
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
